name: Release and publish

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install npm with trusted publishing support
        run: npm install -g npm@latest

      - name: Verify npm trusted publishing support
        run: |
          set -euo pipefail
          NPM_VERSION=$(npm --version)
          echo "npm ${NPM_VERSION}"
          node -e 'const parts = process.argv[1].split("."); if (parts.length !== 3 || parts.some((part) => !/^\d+$/.test(part))) { throw new Error("npm is too old for trusted publishing; need npm >= 11.5.1") } const version = parts.map((part) => Number.parseInt(part, 10)); if (version[0] < 11 || (version[0] === 11 && (version[1] < 5 || (version[1] === 5 && version[2] < 1)))) { throw new Error("npm is too old for trusted publishing; need npm >= 11.5.1") }' "$NPM_VERSION"

      - uses: oven-sh/setup-bun@v2

      - name: Install plugin dependencies
        working-directory: plugin
        run: npm install

      - name: Resolve release version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          VERSION=$(node -p 'require("./plugin/package.json").version')
          TAG="v${VERSION}"

          npm_exists=false
          release_exists=false

          if npm view "opencode-skill-creator@${VERSION}" version >/dev/null 2>&1; then
            npm_exists=true
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            release_exists=true
          fi

          # Auto-bump patch when both npm and GitHub already have this version.
          # This keeps release automation fully hands-off on each merge to main.
          if [[ "$npm_exists" == "true" && "$release_exists" == "true" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            pushd plugin >/dev/null
            npm version patch --no-git-tag-version
            VERSION=$(node -p 'require("./package.json").version')
            popd >/dev/null

            git add plugin/package.json
            git commit -m "chore(release): bump version to v${VERSION} [skip ci]"
            git push origin "HEAD:${GITHUB_REF_NAME}"
            TAG="v${VERSION}"
          fi

          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "target_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Check npm version
        id: npm
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          if npm view "opencode-skill-creator@${VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        # npm trusted publishing is bound to this repository/workflow on npmjs.com.
        # Keep the guard explicit so forks and non-main refs cannot publish.
        if: steps.npm.outputs.exists != 'true' && github.repository == 'antongulin/opencode-skill-creator' && github.ref == 'refs/heads/main'
        run: npm publish --access public --provenance
        working-directory: plugin

      - name: Check GitHub release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.release.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release create "$TAG" \
            --target "${{ steps.version.outputs.target_sha }}" \
            --title "$TAG" \
            --notes "Automated release for opencode-skill-creator $TAG"
